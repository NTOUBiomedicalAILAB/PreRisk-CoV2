name: Secure Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secret into HTML
        run: |
          sed -i "s/___GH_PAT_PLACEHOLDER___/${{ secrets.MY_TRIGGER_PAT }}/g" index.html
          echo "✅ Secret injected successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v5 # 改成 configure-pages
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
