name: PreRisk-CoV2 TenSEAL Analyzer

on:
  repository_dispatch:
    types: [run-analysis] 

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tenseal numpy 
      - name: Download Private Key
        run: |
          wget -O private_key.bin "${{ secrets.PRIVATE_KEY_URL }}"
          echo "✅ Private key downloaded."

      - name: Restore Encrypted Data
        run: |
          echo "${{ github.event.client_payload.file_data }}" | base64 -d > encrypted_result.bin
          echo "✅ Encrypted data restored."

      - name: Run Decryption and Analysis
        run: |
          python prerisk_cov2.py --mode decrypt --encrypted-result encrypted_result.bin
          
      - name: Upload Results (Optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: decrypted_output.txt # 假設您的程式會產生這個結果檔
