name: PreRisk-CoV2 Full Automation

on:
  push:
    branches: [ main ]  # 當您更新程式碼時，自動更新網頁密碼
  repository_dispatch:
    types: [run-analysis] # 當網頁按鈕按下時，啟動雲端分析

jobs:
  # ---------------------------------------------------
  # 任務一：更新網頁 (確保網頁拿得到真 Token)
  # ---------------------------------------------------
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Secret into HTML
        run: |
          # 這裡就是關鍵的 sed 指令！把代號換成您的 MY_TRIGGER_PAT
          sed -i "s/___GH_PAT_PLACEHOLDER___/${{ secrets.MY_TRIGGER_PAT }}/g" index.html
          echo "✅ Secret Injected successfully."

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    permissions:
      contents: read
      pages: write
      id-token: write

  # ---------------------------------------------------
  # 任務二：雲端分析 (原本的功能)
  # ---------------------------------------------------
  analyze:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn matplotlib openpyxl imbalanced-learn tenseal

      - name: Download Private Key
        run: |
          wget -O private_context.bin "${{ secrets.PRIVATE_KEY }}"
          echo "✅ Private context downloaded."

      - name: Restore Encrypted Data
        run: |
          echo "${{ github.event.client_payload.file_data }}" | base64 -d > encrypted_result.bin
          echo "✅ Encrypted data restored."

      - name: Run Decryption and Analysis
        run: |
          python prerisk_cov2.py --mode decrypt --encrypted-result encrypted_result.bin

      - name: Upload Results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: decrypted_output.txt
